audio:
  auto_stop_timeout_min: 10
  channels: 1
  chunk_ms: 100
  device_index: 1
  sample_rate: 16000
gemini:
  context_seed: true
  model: gemini-3.5-live-translate-preview
logging:
  backup_count: 5
  log_dir: logs
  max_bytes: 10485760
network:
  host: 0.0.0.0
  # NOTE: Changing the port changes the attendee URL (http://<ip>:<port>/live),
  # which means the QR code also changes. If you have the QR code saved or
  # printed anywhere, re-download it from the operator console after changing
  # this value and update every place it is used (slides, printed handouts, etc.).
  port: 8080
